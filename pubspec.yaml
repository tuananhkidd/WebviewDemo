name: webview_demo
description: "A scalable Flutter base project (GetX + Dio) with WebView, i18n, theming and a native toast bridge."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management, routing and dependency injection.
  get: ^4.6.6

  # HTTP client used by the Base API client / Dio interceptors.
  dio: ^5.7.0

  # In-app browser used to load the company website.
  webview_flutter: ^4.10.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
